$kind: http-request
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "admin",
      "password": "admin123"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.token) {
          pm.collectionVariables.set("jwt_token", jsonData.token);
          console.log("Token guardado com sucesso!");
      }
    language: text/javascript
order: 1000
