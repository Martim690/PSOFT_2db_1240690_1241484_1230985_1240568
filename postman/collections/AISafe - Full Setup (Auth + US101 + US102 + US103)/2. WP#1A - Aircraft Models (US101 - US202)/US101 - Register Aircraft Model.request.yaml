$kind: http-request
name: US101 - Register Aircraft Model
url: "{{base_url}}/api/aircraft-models"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{jwt_token}}
body:
  type: formdata
  content:
    - type: text
      key: manufacturer
      value: BOEING
      description: ""
      disabled: false
    - type: text
      key: modelName
      value: B777-29967
      description: ""
      disabled: false
    - type: text
      key: fuelCapacity
      value: "320000"
      description: ""
      disabled: false
    - type: text
      key: maximumRange
      value: "15000"
      description: ""
      disabled: false
    - type: text
      key: cruisingSpeed
      value: "900"
      description: ""
      disabled: false
    - type: file
      key: file
      src:
        - /C:/Users/marti/Downloads/exemplo.png
      description: ""
      disabled: false
order: 1000
