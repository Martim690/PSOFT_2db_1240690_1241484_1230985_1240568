$kind: http-request
name: US205 - Status
url: "{{base_url}}/api/aircrafts/fleet-status"
method: GET
headers:
  Content-Type: application/json
  Authorization: Bearer {{jwt_token}}
scripts:
  - type: afterResponse
    code: "// 1. Validar que o código de estado HTTP é 200 OK\r

      pm.test(\"Status code is 200 OK\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      // 2. Validar que a resposta vem no formato JSON\r

      pm.test(\"Response is a valid JSON\", function () {\r

      \    pm.response.to.be.withBody;\r

      \    pm.response.to.be.json;\r

      });\r

      \r

      // 3. Validar a estrutura base do Dashboard\r

      pm.test(\"Dashboard contains total and status counts\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    \r

      \    pm.expect(jsonData).to.have.property(\"totalAircraft\");\r

      \    pm.expect(jsonData.totalAircraft).to.be.a(\"number\");\r

      \    \r

      \    pm.expect(jsonData).to.have.property(\"statusCounts\");\r

      \    pm.expect(jsonData.statusCounts).to.be.an(\"object\");\r

      });\r

      \r

      // 5. Validar a presença dos links HATEOAS\r

      pm.test(\"Response contains valid HATEOAS links\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    \r

      \    pm.expect(jsonData).to.have.property(\"_links\");\r

      \    pm.expect(jsonData._links).to.have.property(\"self\");\r

      \    pm.expect(jsonData._links).to.have.property(\"all-aircrafts\");\r

      });"
    language: text/javascript
order: 1781352202518
