$kind: http-request
name: Login ADMIN
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: "{\r

    \  \"username\": \"admin\",\r

    \  \"password\": \"admin123\"\r

    }"
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.token) {
          pm.collectionVariables.set("jwt_token", jsonData.token);
          console.log("Token saved");
      }
    language: text/javascript
order: 2000
