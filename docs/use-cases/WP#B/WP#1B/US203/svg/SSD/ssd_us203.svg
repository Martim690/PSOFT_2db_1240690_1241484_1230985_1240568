:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.5635" x="456" y="148.9404">The system fetches the aircraft limits,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.7598" x="456" y="166.2314">fetches all active routes, and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.7515" x="456" y="183.5225">filters them based on range and capacity.</text><g class="message" data-participant-1="System" data-participant-2="ATCC"><polygon fill="#181818" points="38.0552,216.0762,28.0552,220.0762,38.0552,224.0762,34.0552,220.0762" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="32.0552" x2="439.8193" y1="220.0762" y2="220.0762"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="7.23" x="44.0552" y="214.8135">2</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="197.9834" x="55.2852" y="214.8135">displays a list of compatible routes</text></g><!--SRC=[PKyzRuGm3DtpAoocgtJN7y1mKdLxbzxOnGG3LaE277CL_xucG5krI-JuFRyFd3N5UMn877fD0jNB_NQh03EiWvjGb3rF61Mg-ct9IcD1jz6jL_n0fOs-Fd2vxYZKnlm0JV1W-WIVnWcLcq0WQLRAq9aXHa0MBzWfd8HwpYh6Il6rn7hwSJWiOxAFS3yef6xVrd0V2F9csv7wmUJLLj_QWKVMV7wF1ueXGD4-ufmjIsiu1oKfroCqcAc5544mzhGImEE4ddLvTcwlUR76fNaDBUSfu6BgPfXBm7-rNKj_E_tQh49V]--></g></svg>