" font-size="13" lengthAdjust="spacing" textLength="176.2808" x="50.2852" y="111.6494">listActiveRoutesSorted(sortBy)</text></g><path d="M392,129.9121 L392,190.9121 L713,190.9121 L713,139.9121 L703,129.9121 L392,129.9121" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M703,129.9121 L703,139.9121 L713,139.9121 L703,129.9121" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.5762" x="398" y="148.9404">The system retrieves all active routes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.5806" x="398" y="166.2314">and sorts them by popularity (number of times used)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295.5659" x="398" y="183.5225">or by distance, depending on the sortBy parameter.</text><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg2"><polygon fill="#181818" points="38.0552,216.0762,28.0552,220.0762,38.0552,224.0762,34.0552,220.0762" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="32.0552" x2="381.9712" y1="220.0762" y2="220.0762"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="7.23" x="44.0552" y="214.8135">2</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="310.686" x="55.2852" y="214.8135">returns sorted list of active routes with usage statistics</text></g><?plantuml-src NP0xRiCm38PtdOBmb01D3k0XG9eRD1cpC1Ph4x0fGw9I-FQbP0TzB7gGFp_o9sODagS7HOUTXWZD-NQvD809oiFD69Kxdb4KclQw9AMfPjUdArNyHALLNWuudBOij31oqdEHq4V8IkaQefBV9RlUb_rFzGidmJwH-q4XV6xH5cu3GLgHaJGoFIa1ZYFKUYkexBkWU2Ze13gOzh707EOyOcHTOBVwB5pboG0vaT_VnKoRqDkWA1szWQUPnBFq4AHmO1qMR1KuaL8yEhVvEvZLQhajS-KegOh9Lz-bqvy1uOjriBRO6rHHJSDTSfx-h-5NfE2_0G00?></g></svg>